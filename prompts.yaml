license_analysis: |
  Analyze the following text and determine the comprehensive licensing information ONLY from explicit license evidence present in the text.
  
  CRITICAL EVIDENCE RULES:
  - Use ONLY the text in "Text to analyze" as evidence.
  - Do NOT infer, guess, or use external knowledge from the project name, package name, repository URL, homepage URL, badges, npm/PyPI/GitHub metadata, or what you may know about the component.
  - A license may be returned only when the text explicitly contains a license grant, a recognizable license body/header, or an explicit statement such as "licensed under the MIT License", "License: Apache-2.0", or "SPDX-License-Identifier: BSD-3-Clause".
  - Mentions of words like "license", "LICENSE file", "open source", "copyright", "repository", "GitHub", "npm", or a link to a README/code page are NOT enough by themselves.
  - If the text does not explicitly identify a license, return no licenses: main_licenses=[], bundled_licenses=[], spdx_expression=null, confidence=0.0.
  - If the text is a README or documentation page and it contains no license section, no license badge with a readable SPDX/license value, and no explicit license sentence, return no licenses.
  - If the text contains only dependency names, package names, URLs, installation instructions, API docs, changelog, or general project description, return no licenses.
  - Do not fill in the most common license for the ecosystem. Do not rely on memory.
  
  INSTRUCTIONS:
  1. Identify the PRIMARY/MAIN license that governs the entire project/package
  2. Identify any bundled/embedded third-party components with different licenses
  3. Construct an accurate SPDX license expression that represents the complete licensing situation
  4. For every returned license, the explanations field must quote or paraphrase the specific text evidence that supports it. If you cannot point to text evidence, do not return that license.
  
  ANALYSIS APPROACH:
  - Look for the main license text at the beginning (often Apache-2.0, MIT, GPL, etc.)
  - Look for explicit README/license-section statements such as "This project is licensed under..."
  - Look for SPDX identifiers only when they are clearly used as license identifiers, not as unrelated tokens
  - Look for sections like "SUBCOMPONENTS", "bundled dependencies", "third-party", etc.
  - Determine if third-party components are merely bundled/embedded (use AND) or provide alternative licensing options (use OR)
  - For projects with bundled dependencies, the typical pattern is: MainLicense AND (Dep1License AND Dep2License AND ...)
  
  SPDX EXPRESSION RULES:
  - Use AND when multiple licenses apply simultaneously (main project + bundled dependencies)
  - Use OR when there are alternative licensing options 
  - Use parentheses to group related licenses
  - Examples:
    * Simple: "Apache-2.0" 
    * With bundled deps: "Apache-2.0 AND (MIT AND BSD-3-Clause AND CDDL-1.1)"
    * Dual licensed: "MIT OR Apache-2.0"
    * Complex: "Apache-2.0 AND (BSD-3-Clause AND MIT AND CDDL-1.1 AND EPL-1.0)"
  
  Text to analyze:
  {content}
  
  Return the analysis in JSON format:
  {{
      "main_licenses": ["Primary SPDX license identifier"],  
      "bundled_licenses": ["List of bundled/third-party SPDX identifiers"],
      "spdx_expression": "Complete SPDX expression representing all licenses, or null if no explicit license evidence exists",
      "is_dual_licensed": true/false,
      "has_third_party_licenses": true/false,
      "third_party_license_location": "section name describing where third-party licenses are documented",
      "license_relationship": "AND/OR based on how licenses relate",
      "confidence": 0.0-1.0,
      "explanations": "detailed reasoning for the SPDX expression"
  }}
  
  IMPORTANT: 
  - Focus on creating an accurate SPDX expression that represents the complete licensing situation
  - For projects with many bundled dependencies, ensure all significant licenses are represented
  - Use standard SPDX identifiers: Apache-2.0, MIT, BSD-3-Clause, BSD-2-Clause, CDDL-1.1, EPL-1.0, GPL-2.0-only, etc.
  - When no explicit license evidence exists, the only valid result is:
    {{
        "main_licenses": [],
        "bundled_licenses": [],
        "spdx_expression": null,
        "is_dual_licensed": false,
        "has_third_party_licenses": false,
        "third_party_license_location": null,
        "license_relationship": "none",
        "confidence": 0.0,
        "explanations": "No explicit license statement or license text was found in the provided text."
    }}
version_resolve: |
  You are a GitHub repository version resolver.
  Here is the list of all available branches and tags (choose only from these):
  {candidate_versions}

  The user requested version string: {version}
  Component name (may be empty): {name}

  Note: some repositories are monorepos where tags encode both a component name and a version (e.g. "timing-v1.0.2" for component "timing" at version "1.0.2"). When a component name is provided, prefer tags that match both the component name and the version string.

  For input version numbers like "1.0" or "2.23" etc., match them to the most appropriate tag or branch like "1.0.0" or "2.23.0" if no exact match is available.

  Please determine the most appropriate branch or tag name the user wants. Only return one value, and it must be strictly from the above list. Do not return SHA, explanations, or anything else.
  If you cannot determine or there is no suitable match, return "{default_branch}".

  Return in the following JSON format:
  {{
      "resolved_version": "xxx",
      "used_default_branch": true/false
  }}

copyright_extract: |
  Analyze the following text and extract copyright information.
  Look for phrases like "Copyright (c)", "Copyright ©", or similar copyright notices.
  If found, return the exact copyright notice.
  If not found, return null.
  If you found multiple copyright notices, return them all, separated by semicolons.
  exact term:"Copyright [yyyy] [name of copyright owner]" is a template of some license, not a real copyright notice, you should not return it.
  terms like "Copyright © 2007 Free Software Foundation, Inc. <https://fsf.org/>" "Copyright (C) 1989, 1991 Free Software Foundation, Inc. <https://fsf.org/>" are the copyright notice of the license text, not 
  the copyright notice of the software. You should not return it either.
  and you should pay attention to distinguish between real copyright notices and those copyright of the license text.
  Do not include any other information or explanation.
  Text:
  {content}

  Return the result in JSON format:
  {{
      "copyright_notice": "exact copyright notice if found, otherwise null"
  }}

copyright_analysis: |
  Analyze the following text and extract ONLY the copyright information. Return ONLY the exact copyright notice as it appears in the text, or 'None' if no copyright notice is found. Do not include any other information or explanation.
  
  INSTRUCTIONS:
  1. Look for phrases like "Copyright (c)", "Copyright ©", or similar copyright notices
  2. Return the EXACT copyright notice as it appears in the text, including the copyright symbol, year, and owner name
  3. Do not interpret or modify the copyright notice in any way
  4. If there are multiple copyright notices, return them all separated by semicolons
  5. Do not return template text like "Copyright [yyyy] [name of copyright owner]" for that's a template of some license, not a real copyright notice
  6. Do not return license text copyright notices like "Copyright © 2007 Free Software Foundation, Inc. <https://fsf.org/>" "Copyright (C) 1989, 1991 Free Software Foundation, Inc. <https://fsf.org/>" for that's a template too.
  
  EXAMPLES:
  
  Text contains: "Copyright © 2020 John Doe; Copyright © 2019 Jane Smith"
  Return: "Copyright © 2020 John Doe; Copyright © 2019 Jane Smith"
  
  Text contains: "Copyright [yyyy] [name of copyright owner]"
  Return: "None"
  
  Text to analyze:
  {combined_content}

github_url_finder: |
  Given the following package URL and package name, find the corresponding GitHub repository URL if it exists.
        Package URL: {package_url}
        Package Name: {name}
        
        Return the result in JSON format:
        {{
            "github_url": "https://github.com/owner/repo if found, otherwise null",
            "confidence": 0.0-1.0
        }}
        
        Only return a GitHub URL if you are confident it is the correct repository.
        If you are not sure, return null.
        You should use both the package URL and the package name for your reasoning.

license_standardize: |
  Convert the following license string to a standard SPDX identifier.
  Only return one SPDX identifier that best matches the input.
  If you're not sure, return "UNKNOWN".
  
  License string: {license_string}
  
  Return in JSON format:
  {{
      "spdx_identifier": "standard SPDX identifier",
      "confidence": 0.0-1.0
  }}
  
  Common SPDX identifiers for reference:
  - Apache-2.0
  - MIT
  - GPL-2.0-only
  - GPL-3.0-or-later
  - LGPL-2.1-only
  - LGPL-3.0-only
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - MPL-2.0
  - AGPL-3.0-only
  when there are multiple licenses, you should determine the relaitonship and compose a spdx license
  expression like Apache-2.0 AND (MIT OR BSD-3-Clause) OR GPL-2.0-only WITH ClasspathException, if you are unsure about the relaitonship between
  licenses, use AND to link them.

license_priority_selector: |
  You are a license file analyzer for software projects. You need to determine which license file is most likely the PRIMARY/MAIN project-level license from a list of license files found in a repository.
  
  ANALYSIS CRITERIA:
  1. **Location Priority**: Files in the root directory are typically more important than those in subdirectories
  2. **Filename Priority**: Standard names like "LICENSE", "LICENSE.txt", "COPYING" are typically main project licenses
  3. **Path Context**: License files in subdirectories may be for specific components/dependencies
  4. **Size/Content Hints**: Main project licenses are typically comprehensive
  
  COMMON PATTERNS:
  - Root level LICENSE/COPYING = Main project license
  - Subdirectory licenses = Component/dependency licenses  
  - Multiple root licenses = Potential dual licensing or outdated files
  - Third-party/vendor directories = Bundled dependency licenses
  
  LICENSE FILES FOUND:
  {license_files_info}
  
  Please analyze the above license files and determine which ONE is most likely the primary project-level license that governs the entire codebase.
  
  Return the result in JSON format:
  {{
      "primary_license_path": "full path of the most likely primary license file",
      "confidence": 0.0-1.0,
      "reasoning": "explanation of why this file was selected as the primary license"
  }}
  
  IMPORTANT:
  - You must select exactly ONE file as the primary license
  - Consider both the file path and filename in your analysis
  - Prefer root-level files over subdirectory files
  - Prefer standard naming conventions (LICENSE, COPYING, etc.)

component_license_locator: |
  You are analyzing a monorepo / multi-package repository to find the license that
  governs ONE specific component (package), not the whole repository.

  The repository contains several subdirectories that each ship their own license
  file. Repositories organize these subdirectories in many different ways, for
  example: "packages/<name>", "packages/@scope/<name>", "libs/<name>",
  "modules/<name>/v2", "src/<name>", etc. You must reason about which subdirectory
  corresponds to the target component by matching the component name against the
  directory paths.

  TARGET COMPONENT:
  - name: {component_name}
  - version: {component_version}

  Notes on the component name:
  - It may include a package scope/prefix (e.g. "@scope/foo"). The matching
    subdirectory is often named just "foo", or "@scope/foo", or "scope-foo".
  - Match on meaning, not exact string equality. "@dicebear/avataaars" should match
    a directory path ending in ".../@dicebear/avataaars" or ".../avataaars".

  CANDIDATE SUBDIRECTORIES (each contains license file(s)):
  {candidate_dirs}

  Decide which ONE candidate subdirectory holds the license that governs the target
  component. If NONE of the candidates clearly corresponds to this component (i.e.
  the component is the repository as a whole, or no directory matches the name),
  return null so the caller falls back to the repository-level license. When in
  doubt, prefer null over guessing — do not force a match.

  Return the result in JSON format:
  {{
      "license_directory": "exact directory path of the matching candidate, or null",
      "confidence": 0.0-1.0,
      "reasoning": "why this directory matches the component, or why none does"
  }}

  IMPORTANT:
  - "license_directory" MUST be copied verbatim from one of the candidate directory
    paths above, or be null. Never invent a path.
  - Only choose a directory when the component name clearly maps to it.

font_license_priority_selector: |
  You are a license file selector for a FONT project. A repository may contain several
  license files, but you must pick the ONE that governs the FONT itself (the typeface /
  font software that is being distributed), NOT the license of build tools, scripts,
  example code, or bundled dependencies.

  FONT-SPECIFIC SELECTION RULES (in priority order):
  1. Prefer the license that applies to the font/typeface. Open-source fonts are almost
     always under the SIL Open Font License — files named "OFL.txt", "OFL", "OFL-1.1.txt",
     or a root "LICENSE"/"LICENSE.txt"/"COPYING" that contains the font's terms are the
     strongest candidates.
  2. Root-directory license files outrank ones inside subdirectories.
  3. DEPRIORITIZE licenses that clearly belong to tooling/code rather than the font, e.g.
     files under directories like "tools/", "scripts/", "build/", "src/", "node_modules/",
     "vendor/", "third_party/", or a stand-alone MIT/Apache "LICENSE" that sits next to
     build scripts while an OFL governs the actual font.
  4. If both an OFL (for the font) and another license (e.g. MIT for scripts) exist, choose
     the OFL / font license.

  LICENSE FILES FOUND:
  {license_files_info}

  Pick the ONE file most likely to be the license of the distributed font.

  Return the result in JSON format:
  {{
      "primary_license_path": "full path of the font's license file",
      "confidence": 0.0-1.0,
      "reasoning": "why this file governs the font (and why others were rejected)"
  }}

  IMPORTANT:
  - Select exactly ONE file.
  - Favor the font's own license (often OFL) over tooling/dependency licenses.
