# License risk classification.
#
# This file maps SPDX license identifiers (and a few synthetic markers like
# Unlicensed / Others) to a risk category and corresponding risk_level.
#
# Risk levels:
#   low      - permissive licenses (MIT, Apache, BSD, ISC, ...)
#   medium   - weak copyleft (LGPL, MPL, EPL, CDDL, ...)
#   high     - strong copyleft (GPL, AGPL, SSPL, ...), proprietary /
#              non-OSI licenses, and unlicensed code (no license granted)
#   unknown  - anything that does not match a known identifier
#
# When a project's concluded license is an SPDX expression containing
# multiple licenses (e.g. "MIT AND GPL-3.0-or-later AND Others"), the
# aggregate risk is the HIGHEST risk of any component, in the order:
#   high > medium > low > unknown
#
# Matching is case-insensitive and ignores SPDX suffixes such as
# "-or-later", "-only", "+", and license-exception suffixes after WITH.
# Add entries below to extend coverage.

default: unknown

# Aggregation policy used by code that combines multiple licenses in one
# expression. Listed in order of severity (worst first).
severity_order:
  - high
  - medium
  - low
  - unknown

# Display labels written to the output column. Keep the internal keys
# (high/medium/low/unknown) for severity comparisons; only the human-facing
# label is configurable here. Edit the right-hand side to change the
# wording (e.g. switch to English).
labels:
  high: 高风险
  medium: 中风险
  low: 低风险
  unknown: 未知风险

categories:
  permissive:
    risk_level: low
    licenses:
      - MIT
      - MIT-0
      - Apache-1.0
      - Apache-1.1
      - Apache-2.0
      - BSD-2-Clause
      - BSD-2-Clause-Patent
      - BSD-3-Clause
      - BSD-3-Clause-Clear
      - BSD-4-Clause
      - 0BSD
      - ISC
      - Zlib
      - libpng
      - Libpng-2.0
      - PostgreSQL
      - X11
      - Unlicense
      - WTFPL
      - CC0-1.0
      - CC-BY-3.0
      - CC-BY-4.0
      - Python-2.0
      - PSF-2.0
      - BSL-1.0
      - NCSA
      - Artistic-2.0
      - Beerware
      - JSON
      - Ruby
      - OFL-1.1
      - Unicode-DFS-2016
      - BlueOak-1.0.0

  weak-copyleft:
    risk_level: medium
    licenses:
      - LGPL-2.0
      - LGPL-2.0-only
      - LGPL-2.0-or-later
      - LGPL-2.1
      - LGPL-2.1-only
      - LGPL-2.1-or-later
      - LGPL-3.0
      - LGPL-3.0-only
      - LGPL-3.0-or-later
      - MPL-1.0
      - MPL-1.1
      - MPL-2.0
      - EPL-1.0
      - EPL-2.0
      - CDDL-1.0
      - CDDL-1.1
      - CPL-1.0
      - APSL-2.0
      - IPL-1.0
      - EUPL-1.1
      - EUPL-1.2
      - Artistic-1.0

  strong-copyleft:
    risk_level: high
    licenses:
      - GPL-1.0
      - GPL-1.0-only
      - GPL-1.0-or-later
      - GPL-2.0
      - GPL-2.0-only
      - GPL-2.0-or-later
      - GPL-3.0
      - GPL-3.0-only
      - GPL-3.0-or-later
      - AGPL-1.0
      - AGPL-1.0-only
      - AGPL-1.0-or-later
      - AGPL-3.0
      - AGPL-3.0-only
      - AGPL-3.0-or-later
      - SSPL-1.0
      - OSL-3.0
      - CC-BY-SA-3.0
      - CC-BY-SA-4.0
      - CC-BY-NC-3.0
      - CC-BY-NC-4.0
      - CC-BY-NC-SA-3.0
      - CC-BY-NC-SA-4.0
      - CC-BY-NC-ND-3.0
      - CC-BY-NC-ND-4.0

  proprietary:
    # Non-OSI / proprietary / unknown commercial terms.
    risk_level: high
    licenses:
      - Proprietary
      - Commercial
      - LicenseRef-Proprietary
      - SEE-LICENSE-IN-FILE
      - UNLICENSED       # npm convention: explicitly not for use by others
      - NONE
      - Nonstandard

  unlicensed:
    # No license grant at all — treat as all-rights-reserved.
    risk_level: high
    licenses:
      - Unlicensed
      - NoLicense
      - NOASSERTION
      - Others           # bundled third-party of unknown composition
