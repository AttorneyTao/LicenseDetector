name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Pull & Restart Service
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /root/LicenseDetector
          git fetch origin master
          git reset --hard origin/master

      - name: Sync dependencies
        run: |
          cd /root/LicenseDetector
          uv sync

      - name: Restart service
        run: |
          systemctl restart licensedetector.service

      - name: Verify service is running
        run: |
          sleep 3
          systemctl is-active licensedetector.service

      - name: Notify success
        if: success()
        run: |
          cd /root/LicenseDetector
          uv run python /root/ops/notify_deploy.py \
            "github-actions" "success" \
            "Triggered by push to master (workflow run: ${{ github.run_number }})" || true

      - name: Notify failure
        if: failure()
        run: |
          cd /root/LicenseDetector
          uv run python /root/ops/notify_deploy.py \
            "github-actions" "failure" \
            "Workflow run ${{ github.run_number }} failed — check Actions logs for details" || true
