name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Pull & Restart Service
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /root/LicenseDetector
          git fetch origin master
          git reset --hard origin/master

      - name: Sync dependencies
        run: |
          cd /root/LicenseDetector
          uv sync

      - name: Restart service
        # timeout guards against a hung systemd job blocking the self-hosted
        # runner forever; fail loudly instead of hanging if restart exceeds 120s.
        run: |
          timeout 120 systemctl restart licensedetector.service

      - name: Verify service is running
        run: |
          for i in $(seq 1 10); do
            if systemctl is-active --quiet licensedetector.service; then
              echo "Service is active"
              exit 0
            fi
            sleep 2
          done
          echo "Service failed to become active" >&2
          systemctl status licensedetector.service --no-pager || true
          journalctl -u licensedetector.service -n 40 --no-pager || true
          exit 1

      - name: Notify success
        if: success()
        run: |
          cd /root/LicenseDetector
          uv run python /root/ops/notify_deploy.py \
            "github-actions" "success" \
            "Triggered by push to master (workflow run: ${{ github.run_number }})" || true

      - name: Notify failure
        if: failure()
        run: |
          cd /root/LicenseDetector
          uv run python /root/ops/notify_deploy.py \
            "github-actions" "failure" \
            "Workflow run ${{ github.run_number }} failed — check Actions logs for details" || true
